services:
  embedder:
    build:
      context: ./embedder
    expose:
      - "8000"
    volumes:
      - embedder-models:/models
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  memory:
    build:
      context: ./memory-service
    ports:
      - "8081:8081"
    environment:
      - MEMORY_BEARER_TOKEN=${MEMORY_BEARER_TOKEN}
      - MEMORY_DB_PATH=/data/memory.sqlite
      - EMBEDDER_URL=http://embedder:8000
      - MODEL_URL=${MODEL_URL:-http://host.docker.internal:8080}
      # Container clock for the agent's nowContext + schedule ISO↔epoch + consolidation timing.
      # Single-user deployment is in Cuba; override TZ in .env for a different zone.
      - TZ=${TZ:-America/Havana}
      - IDLE_MS=180000
      - POST_TURN_MS=15000
    volumes:
      - ./docker-data/memory:/data
    depends_on:
      embedder:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      # curl (installed in the runtime image); the slim base has no wget, which left the
      # container permanently "unhealthy" despite healthz returning 200.
      test: ["CMD", "curl", "-fsS", "http://localhost:8081/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  voice:
    build:
      context: ./voice
    ports:
      - "8082:8082"
    environment:
      - VOICE_BEARER_TOKEN=${MEMORY_BEARER_TOKEN}
      - MEMORY_URL=http://memory:8081
      - MEMORY_BEARER_TOKEN=${MEMORY_BEARER_TOKEN}
      - WHISPER_MODEL=distil-small.en   # English-only distil model: ~6x faster than small, accurate for EN
      - WHISPER_LANGUAGE=en             # user speaks English → force EN (skips detect, avoids mis-transcription)
      - WHISPER_CPU_THREADS=8           # i3-13100 has 8 threads
      - WHISPER_CACHE=/models
      - HF_HUB_CACHE=/models
      - KOKORO_VOICE=
      - TZ=${TZ:-America/Havana}
    volumes:
      - voice-models:/models
    depends_on:
      memory:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8082/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  embedder-models:
  voice-models:
